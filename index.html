<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>교사용 바탕화면 대시보드</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=Nanum+Gothic:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Gothic+A1:wght@300;400;500;600;700&family=Do+Hyeon&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div class="background-overlay"></div>

  <div class="dashboard-wrapper">
    <!-- 상단 영역: 달력 스트립 + D-Day 카드 -->
    <div class="calendar-area">
      <div class="calendar-strip" id="calendar-strip">
        <button class="cal-strip-nav cal-strip-prev" id="cal-strip-prev">
          <i class="fas fa-chevron-left"></i>
        </button>
        <div class="cal-strip-scroll" id="cal-strip-scroll">
          <div class="cal-strip-track" id="cal-strip-track"></div>
        </div>
        <button class="cal-strip-nav cal-strip-next" id="cal-strip-next">
          <i class="fas fa-chevron-right"></i>
        </button>
      </div>
      <div class="dday-cards-area" id="dday-cards-area"></div>
    </div>

    <!-- 날짜 호버 툴팁 -->
    <div class="day-tooltip" id="day-tooltip" style="display:none;">
      <button class="day-tooltip-btn" id="day-tooltip-dday">
        <i class="fas fa-calendar-check"></i> D-Day
      </button>
      <button class="day-tooltip-btn" id="day-tooltip-memo">
        <i class="fas fa-sticky-note"></i> 메모
      </button>
    </div>

    <div class="dashboard-container">
      <!-- Section 1 - Left (25%) -->
      <section class="column column-left" data-column="left">
        <div class="card card-timetable" data-card-id="timetable" draggable="true">
          <div class="card-header">
            <i class="fas fa-clock"></i>
            <h2>오늘의 시간표</h2>
            <span class="badge" id="today-day"></span>
          </div>
          <div class="card-body">
            <ul class="timetable-list" id="timetable-list">
              <li class="timetable-item skeleton"><span class="period">1</span><span class="subject">불러오는 중...</span></li>
            </ul>
          </div>
        </div>

        <div class="card card-lunch" data-card-id="lunch" draggable="true">
          <div class="card-header">
            <i class="fas fa-utensils"></i>
            <h2>오늘의 급식</h2>
          </div>
          <div class="card-body">
            <div class="school-search" id="school-search">
              <input type="text" id="school-name-input" placeholder="학교 이름 검색..." spellcheck="false">
              <button id="school-search-btn"><i class="fas fa-search"></i></button>
            </div>
            <div class="school-current" id="school-current"></div>
            <ul class="lunch-list" id="lunch-list">
              <li class="lunch-item skeleton">불러오는 중...</li>
            </ul>
          </div>
        </div>
      </section>

      <!-- Section 2 - Center (50%) -->
      <section class="column column-center" data-column="center">
        <div class="clock-widget">
          <div class="clock-time" id="clock-time">00:00</div>
          <div class="clock-date" id="clock-date">0000년 00월 00일</div>
        </div>

        <div class="center-cards">
          <div class="card card-todo" data-card-id="todo" draggable="true">
            <div class="card-header">
              <i class="fas fa-check-circle"></i>
              <h2>TO DO LIST</h2>
              <button class="btn-add" id="btn-add-todo" title="할 일 추가">
                <i class="fas fa-plus"></i>
              </button>
            </div>
            <div class="card-body">
              <ul class="todo-list" id="todo-list">
                <li class="todo-item skeleton">불러오는 중...</li>
              </ul>
            </div>
          </div>

          <div class="card card-memo" data-card-id="memo" draggable="true">
            <div class="card-header">
              <i class="fas fa-sticky-note"></i>
              <h2>MEMO</h2>
            </div>
            <div class="card-body">
              <textarea class="memo-textarea" id="memo-textarea" placeholder="메모를 입력하세요..."></textarea>
            </div>
          </div>
        </div>

        <!-- Dock Zone -->
        <div class="dock-zone">
          <div class="settings-wrapper" id="settings-wrapper">
            <button class="settings-btn" id="settings-btn" title="설정">
              <i class="fas fa-cog"></i>
            </button>
            <div class="settings-panel" id="settings-panel">
              <h3 class="settings-title">대시보드 설정</h3>
              <div class="settings-group">
                <label>배경 색상</label>
                <div class="settings-color-row">
                  <input type="color" id="setting-bg-color" value="#1e293b">
                  <span class="settings-color-label" id="setting-bg-label">#1e293b</span>
                  <input type="range" id="setting-bg-opacity" min="0" max="100" value="0" class="settings-range">
                  <span class="settings-range-label" id="setting-bg-opacity-label">0%</span>
                </div>
              </div>
              <div class="settings-group">
                <label>카드 색상</label>
                <div class="settings-color-row">
                  <input type="color" id="setting-card-color" value="#ffffff">
                  <span class="settings-color-label" id="setting-card-label">#ffffff</span>
                  <input type="range" id="setting-card-opacity" min="20" max="100" value="72" class="settings-range">
                  <span class="settings-range-label" id="setting-card-opacity-label">72%</span>
                </div>
              </div>
              <div class="settings-group">
                <label>폰트</label>
                <select id="setting-font" class="settings-select">
                  <option value="'Noto Sans KR', sans-serif">Noto Sans KR</option>
                  <option value="'Pretendard', sans-serif">Pretendard</option>
                  <option value="'IBM Plex Sans KR', sans-serif">IBM Plex Sans KR</option>
                  <option value="'Nanum Gothic', sans-serif">나눔고딕</option>
                  <option value="'Nanum Myeongjo', serif">나눔명조</option>
                  <option value="'Gothic A1', sans-serif">Gothic A1</option>
                  <option value="'Do Hyeon', sans-serif">도현</option>
                </select>
              </div>
              <div class="settings-group">
                <label>폰트 색상</label>
                <div class="settings-color-row">
                  <input type="color" id="setting-font-color" value="#1a1a1a">
                  <span class="settings-color-label" id="setting-font-label">#1a1a1a</span>
                </div>
              </div>
              <div class="settings-actions">
                <button class="settings-reset" id="settings-reset">초기화</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 3 - Right (25%) -->
      <section class="column column-right" data-column="right">
        <!-- 작업 중 폴더 (내부 투명 - 바탕화면 폴더 위치) -->
        <div class="card card-folders card-see-through" data-card-id="folders" draggable="true">
          <div class="card-header">
            <i class="fas fa-folder-open"></i>
            <h2>작업 중 폴더</h2>
          </div>
          <div class="card-body"></div>
        </div>

        <div class="card card-links" data-card-id="links" draggable="true">
          <div class="card-header">
            <i class="fas fa-link"></i>
            <h2>즐겨찾기 링크</h2>
          </div>
          <div class="card-body">
            <div class="link-grid" id="link-grid">
              <a class="link-item skeleton" href="#">불러오는 중...</a>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <!-- D-Day 추가 모달 -->
  <div class="dday-modal-overlay" id="dday-modal-overlay" style="display:none;">
    <div class="dday-modal">
      <div class="dday-modal-header">
        <h3 id="dday-modal-title">D-Day 추가</h3>
        <button class="dday-modal-close" id="dday-modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div class="dday-modal-body">
        <label id="dday-label-name">이벤트 이름</label>
        <input type="text" id="dday-input-name" placeholder="예: 기말고사" maxlength="30">
        <label>날짜 선택</label>
        <input type="date" id="dday-input-date">
      </div>
      <div class="dday-modal-footer">
        <button class="dday-modal-cancel" id="dday-modal-cancel">취소</button>
        <button class="dday-modal-submit" id="dday-modal-submit">추가</button>
      </div>
    </div>
  </div>

  <!-- JS 로딩 순서: API → 컴포넌트 → 메인 -->
  <script src="js/google-api.js"></script>
  <script src="js/components/timetable.js"></script>
  <script src="js/components/meals.js"></script>
  <script src="js/components/todo.js"></script>
  <script src="js/components/links.js"></script>
  <script src="js/components/settings.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
